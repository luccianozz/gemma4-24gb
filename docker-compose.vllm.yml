services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: gemma4-12b
    runtime: nvidia
    ipc: host
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - LLAMA_API_KEY=${LLAMA_API_KEY}
    command:
      - --model=google/gemma-4-12B-it-qat-w4a16-ct
      - --max-model-len=32768
      - --gpu-memory-utilization=0.92
      - --kv-cache-dtype=fp8
      - --enforce-eager
      - --reasoning-parser=gemma4
      - --tool-call-parser=gemma4
      - --enable-auto-tool-choice
      - --api-key=${LLAMA_API_KEY}
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -fsS -H \"Authorization: Bearer $$LLAMA_API_KEY\" http://localhost:8000/v1/models || curl -fsS http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    restart: unless-stopped

volumes:
  hf_cache:

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ─── Logging ──────────────────────────────────────────────────────────
    log_format main escape=json '{'
        '"time":"$time_iso8601",'
        '"remote":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"upstream":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_time":"$upstream_response_time",'
        '"request_time":$request_time,'
        '"bytes":$body_bytes_sent,'
        '"limit_status":"$limit_req_status"'
        '}';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # ─── Streaming-friendly ───────────────────────────────────────────────
    # LLM responses can take minutes. SSE must flow unbuffered.
    keepalive_timeout       300s;
    keepalive_requests      1000;
    proxy_read_timeout      600s;
    proxy_send_timeout      600s;
    proxy_connect_timeout   10s;
    proxy_buffering         off;
    proxy_request_buffering off;
    proxy_http_version      1.1;

    client_max_body_size    32m;     # image uploads if mmproj used

    # ─── Rate limiting ────────────────────────────────────────────────────
    # Per-IP: 30 req/min sustained, 10 burst. Tune to your tier model.
    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=30r/m;

    # Per-API-key (extracted from Authorization header).
    map $http_authorization $api_key {
        default "anon";
        "~*^Bearer\s+(.+)$" $1;
    }
    limit_req_zone $api_key zone=per_key:10m rate=120r/m;

    # Concurrent in-flight requests per IP (backpressure).
    limit_conn_zone $binary_remote_addr zone=conc_ip:10m;

    # Return 429 (not default 503) on rate-limit hit.
    limit_req_status 429;
    limit_conn_status 429;

    # ─── Upstream pool ────────────────────────────────────────────────────
    # Docker DNS resolves `llama` to all replica IPs. `resolve` re-checks
    # so `docker compose up --scale llama=N` is picked up live.
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream llama_pool {
        # zone shared across workers; 'service=llama' picks up scaled replicas
        zone llama_pool 64k;
        server llama:8000 resolve max_fails=2 fail_timeout=10s;
        keepalive 32;
    }

    # ─── Server (HTTPS) ───────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Health: bypass rate limit, no auth — for LB probes
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
        }

        # llama.cpp /health (lightweight)
        location = /health {
            access_log off;
            limit_req zone=per_ip burst=20 nodelay;
            proxy_pass http://llama_pool;
        }

        # Metrics: require auth, IP allowlist via $allowed_metrics_ip
        location = /metrics {
            # Restrict to private network — tighten as needed.
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://llama_pool;
        }

        # API: rate-limit per IP + per key, concurrency cap.
        location / {
            limit_req  zone=per_ip  burst=10 nodelay;
            limit_req  zone=per_key burst=40 nodelay;
            limit_conn conc_ip 8;

            # Retry to another replica on 502/503/504. NOT on 429 (would loop).
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 5s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;

            proxy_pass http://llama_pool;
        }
    }

    # ─── HTTP → HTTPS redirect ────────────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;
        location = /nginx-health { access_log off; return 200 "ok\n"; }
        location / { return 301 https://$host$request_uri; }
    }
}

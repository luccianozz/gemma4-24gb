services:
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: gemma4-12b
    runtime: nvidia
    ports:
      - "8000:8000"
    volumes:
      - llama_cache:/root/.cache/llama.cpp
    environment:
      - HF_TOKEN=${HF_TOKEN}
    command:
      - -hf
      - bartowski/gemma-4-12B-it-GGUF:Q4_K_M
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --n-gpu-layers
      - "-1"
      - --flash-attn
      - "on"
      - --ctx-size
      - "131072"
      - --parallel
      - "16"
      - --batch-size
      - "2048"
      - --ubatch-size
      - "1024"
      - --cache-type-k
      - q8_0
      - --cache-type-v
      - q8_0
      - --api-key
      - ${VLLM_API_KEY}
      - --metrics
      - --alias
      - gemma-4-12b
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s
    restart: unless-stopped

volumes:
  llama_cache:

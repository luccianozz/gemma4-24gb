services:
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: gemma4-12b
    runtime: nvidia
    ipc: host
    ports:
      - "8000:8000"
    volumes:
      - llama_cache:/root/.cache/llama.cpp
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - VLLM_API_KEY=${VLLM_API_KEY}
    command:
      - -hf
      - bartowski/gemma-4-12B-it-GGUF:Q4_K_M
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --n-gpu-layers
      - "-1"
      - --flash-attn
      - "on"
      - --ctx-size
      - "8192"
      - --parallel
      - "2"
      - --batch-size
      - "2048"
      - --ubatch-size
      - "2048"
      - --cache-type-k
      - f16
      - --cache-type-v
      - f16
      - -hfd
      - unsloth/gemma-4-E2B-it-GGUF:Q4_K_M
      - --spec-type
      - draft-simple
      - --spec-draft-n-max
      - "24"
      - --spec-draft-n-min
      - "4"
      - --spec-draft-p-min
      - "0.4"
      - --gpu-layers-draft
      - "99"
      - --api-key
      - ${VLLM_API_KEY}
      - --metrics
      - --reasoning-format
      - deepseek
      - --reasoning-budget
      - "256"
      - --alias
      - gemma-4-12b
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -fsS -H \"Authorization: Bearer $$VLLM_API_KEY\" http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s
    restart: unless-stopped

  bench:
    image: python:3.12-slim
    profiles: ["bench"]
    container_name: gemma4-12b-bench
    depends_on:
      llama:
        condition: service_healthy
    environment:
      - VLLM_API_KEY=${VLLM_API_KEY}
      - LLAMA_URL=http://llama:8000
      - MODEL=gemma-4-12b
      - CONCURRENCY_LEVELS=${CONCURRENCY_LEVELS:-1,4,8,16,32}
      - MAX_TOKENS=${MAX_TOKENS:-300}
      - PROMPT=${PROMPT:-Count from 1 to 100, one number per line.}
    volumes:
      - ./bench:/bench:ro
    command: ["sh", "-c", "pip install --quiet --no-cache-dir httpx==0.27.* && python /bench/run.py"]

volumes:
  llama_cache:
